
{% extends 'AppUsers/login.html' %}
{% load static %}
{% block lb %}

{% endblock lb %}
{% block formulario %}
{% csrf_token %}
    <div class="email">
        <label for="email">{{form.username.label}}</label>
        <div class="sec-2">
            <ion-icon name="person-circle-outline"></ion-icon>
            {{form.username}}
        </div>
    </div>
    <div class="email">
        <label for="email">{{form.first_name.label}}</label>
        <div class="sec-2">
            <ion-icon name="text-outline"></ion-icon>
            {{form.first_name}}
        </div>
    </div>
    <div class="email">
        <label for="email">{{form.last_name.label}}</label>
        <div class="sec-2">
            <ion-icon name="text-outline"></ion-icon>
            {{form.last_name}}
        </div>
    </div>
    <div class="email">
        <label for="email">{{form.email.label}}</label>
        <div class="sec-2">
            <ion-icon name="mail-outline"></ion-icon>
            {{form.email}}
        </div>
    </div>
    <div class="email">
        <label for="email">{{form.rol.label}}</label>
        <div class="sec-2">
            <ion-icon name="bag-outline"></ion-icon>
            <select name='rol' class="styled-select">
                <option value="2">EMPLEADO</option>
                <option value="1">ADMINISTRADOR</option>
              </select>  
        </div>
    </div>
    <div class="email">
        <label for="password">Contraseña</label>
        <div class="sec-2">
          <ion-icon name="lock-closed-outline"></ion-icon>
          <input class="pas" id="pas" type="password" name="password1" placeholder="Ingrese su contraseña..."/>
        </div>
      </div>

      <div class="email">
        <label for="password">Contraseña(confirmacion)</label>
        <div class="sec-2">
          <ion-icon name="lock-closed-outline"></ion-icon>
          <input class="pas" id="pas" type="password" name="password2" placeholder="Confirme su contraseña"/>
        </div>
      </div>

    
  


  <button class="login" type="submit">Registrar</button>
  <div class="footer"><span>Registrarse</span><span>¿Olvidó su contraseña?</span></div>


{% endblock formulario %}
